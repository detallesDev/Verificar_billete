<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Billetes BCB - Siniestro</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="contenedor">
        <h2>Verificador de Billetes BCB</h2>
        <p>Verifica si tu billete pertenece al lote inhabilitado del avión.</p>
        
        <div class="pestanas">
            <button id="btnTabCamara" class="activa">Cámara</button>
            <button id="btnTabManual">Manual</button>
        </div>

        <div id="seccionCamara" class="seccion">
            <div class="marco-camara">
                <video id="videoCamara" autoplay playsinline></video>
                <canvas id="lienzoOculto" class="oculta"></canvas>
                <div class="guia-escaneo"></div>
            </div>
            <button id="botonEscanear" class="boton-principal">Escanear Billete</button>
            
            <div class="depuracion">
                <p><strong>Lo que lee la cámara (Debug):</strong></p>
                <pre id="textoDetectadoPantalla">Esperando escaneo...</pre>
            </div>
        </div>

        <div id="seccionManual" class="seccion oculta">
            <div class="formulario">
                <label for="entradaSerie">Escribe el número de serie completo:</label>
                <input type="text" id="entradaSerie" placeholder="Ej: 8090011000B">
                <button id="botonValidarManual" class="boton-principal">Validar Serie</button>
            </div>
        </div>

        <div id="contenedorResultado" class="oculto">
            <h3 id="tituloResultado"></h3>
            <p id="mensajeResultado"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
